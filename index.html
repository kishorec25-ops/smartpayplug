<!DOCTYPE html>
<html>

<head>
<title>SmartPay Plug</title>

<style>
body{
font-family: Arial;
text-align: center;
margin-top: 120px;
}

button{
background-color:#2d6cdf;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background-color:#1f4fb8;
}
</style>

</head>

<body>

<h1>⚡ SmartPay Plug</h1>
<p>Smart Payment Controlled Power Plug</p>

<button onclick="payNow()">Pay & Turn On Power</button>

<script>
function payNow(){
fetch("https://smartpayplug-api.onrender.com/pay")
.then(response => response.json())
.then(data => alert(data.message));
}
</script>

</body>
</html>
